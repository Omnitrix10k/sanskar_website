<div class="col-lg-12">
                        <div class="bd-elements-section-wrapper section-title-space text-center">
                            <div class="bd-elements-line">
                                <div class="bd-separator-line line-left"></div>
                                <div class="bd-elements-title-wrapper">
                                    <h2 class="bd-elements-title small">Contact Us </h2>
                                </div>
                                <div class="bd-separator-line line-right"></div>
                            </div>
                            <p class=""></p>
                        </div>
                    </div>
<section class="bd-contact-form-area section-space">
            <div class="container">
                <div class="row gy-30 justify-content-between align-items-center">
                    <div class="col-xl-6 col-lg-6">
                        <div class="bd-contact-form-wrapper">
                            <div class="bd-section-title-wrapper section-title-space">
                                <h2 class="bd-section-title mb-20">Get in touch</h2>
                                <p class="bd-section-paragraph">Our friendly team would love to hear from you.</p>
                            </div>
                            <div class="bd-contact-form">
                                <form action="#" id="contactForm">
                                    <div class="row gy-30">
                                        <!-- Full Name Field -->
                                        <div class="col-md-12">
                                            <div class="form-input-box">
                                                <div class="form-input-title">
                                                    <label for="firstName">Full Name<span>*</span></label>
                                                </div>
                                                <div class="form-input">
                                                    <input name="firstName" id="firstName" type="text" placeholder="First Name" required>
                                                </div>
                                            </div>
                                        </div>

                                        <!-- Email Address Field -->
                                        <div class="col-md-12">
                                            <div class="form-input-box">
                                                <div class="form-input-title">
                                                    <label for="emailAddress">Email Address<span>*</span></label>
                                                </div>
                                                <div class="form-input">
                                                    <input name="email" id="emailAddress" type="email" placeholder="Email Address" required>
                                                </div>
                                            </div>
                                        </div>

                                        <!-- Subject Field -->
                                        <div class="col-md-12">
                                            <div class="form-input-box">
                                                <div class="form-input-title">
                                                    <label for="subject">Subject</label>
                                                </div>
                                                <div class="form-input">
                                                    <input name="subject" id="subject" type="text" placeholder="Subject">
                                                </div>
                                            </div>
                                        </div>

                                        <!-- Message Field -->
                                        <div class="col-xxl-12">
                                            <div class="form-input-box mb-15">
                                                <div class="form-input-title">
                                                    <label for="message">Message<span>*</span></label>
                                                </div>
                                                <div class="form-input">
                                                    <textarea id="message" name="message" placeholder="Message" required></textarea>
                                                </div>
                                            </div>
                                            <div class="checkbox-option">
                                                <input id="course-check-1" type="checkbox" required>
                                                <label for="course-check-1">You agree to our friendly <span
                                                        class="text-border-highlights"><a href="privacy-policy.html">
                                                            privacy policy</a><span
                                                            class="theme-black h-1px bottom-0"></span></span>.</label>
                                            </div>
                                        </div>

                                        <!-- Submit Button -->
                                        <div class="col-xxl-12">
                                            <div class="bd-contact-form-btn">
                                                <button class="bd-btn btn-primary w-100" type="submit">Submit</button>
                                            </div>
                                        </div>
                                    </div>
                                </form>
                            </div>

                            <script>
                                document.getElementById('contactForm').addEventListener('submit', function(event) {
                                    // Check if all required fields are filled
                                    if (!this.checkValidity()) {
                                        event.preventDefault();
                                        alert('Please fill out all required fields.');
                                    } else {
                                        // Additional custom validation can be added here if needed
                                        alert('Form submitted successfully!');
                                    }
                                });
                            </script>
                        </div>
                    </div>
                    <div class="col-xl-6 col-lg-6">
                        <div class="bd-contact-form-thumb"><img src="assets/images/img/CONTACT US/576 X 700.png" alt="images"></div>
                    </div>
                </div>
            </div>
        </section>
        <!-- contact form area end -->
