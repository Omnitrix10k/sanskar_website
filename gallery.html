      /* ===================================================== */
/* GALLERY PAGE – SANSKAR CBSE */
/* ===================================================== */

.gallery-section {
    padding: 110px 0;
    background: #ffffff;
}

/* TITLE */
.gallery-title {
    text-align: center;
    margin-bottom: 60px;
}

.gallery-title h2 {
    font-size: 38px;
    font-weight: 700;
    margin-bottom: 14px;
    color: #222;
}

.gallery-title p {
    max-width: 760px;
    margin: auto;
    font-size: 15.5px;
    line-height: 1.8;
    color: #555;
}

/* GRID */
.gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 28px;
    max-width: 1200px;
    margin: auto;
}

/* ITEM */
.gallery-item {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1; /* PERFECT SQUARE */
    overflow: hidden;
    border-radius: 16px;
    background: #f3f3f3;
    box-shadow: 0 20px 45px rgba(0,0,0,0.12);
}

/* IMAGE */
.gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
}

/* OVERLAY */
.gallery-item::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
        180deg,
        rgba(0,0,0,0) 40%,
        rgba(0,0,0,0.55)
    );
    opacity: 0;
    transition: opacity 0.4s ease;
}

/* HOVER */
.gallery-item:hover img {
    transform: scale(1.08);
}

.gallery-item:hover::after {
    opacity: 1;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .gallery-title h2 {
        font-size: 32px;
    }
}

     </style>

    .bd-preloader-content {
